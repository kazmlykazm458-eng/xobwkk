name: Build APK Premium

on: 
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # هذا السطر يسمح لك بتشغيل البناء يدوياً من واجهة GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # هذه هي الخطوة السحرية التي ستتولى كل شيء بشكل صحيح
      - name: Build with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          # تأكد من أن buildozer.spec موجود في المجلد الرئيسي لمشروعك
          workdir: .       
          # ننصحك باستخدام الإصدار 'master' لضمان الحصول على أحدث التحسينات
          buildozer_version: master

      # لتحميل ملف APK الناتج
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ALi-Project-APK
          path: ${{ steps.buildozer.outputs.filename }}
